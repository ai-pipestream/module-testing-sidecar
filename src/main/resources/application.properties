# Module Testing Sidecar Configuration
quarkus.application.name=module-testing-sidecar

# Production HTTP/gRPC Server Configuration
quarkus.http.port=19040
quarkus.http.host=0.0.0.0
quarkus.grpc.server.use-separate-server=false

# Development override
%dev.quarkus.http.port=19140
%dev.quarkus.http.host=0.0.0.0

# Pipestream Server Configuration
pipestream.server.class=module

# Registration Configuration
pipestream.registration.enabled=true
pipestream.registration.type=MODULE
pipestream.registration.mode=grpc
pipestream.registration.service-name=module-testing-sidecar
pipestream.registration.description=On-demand module testing sidecar for direct module execution
pipestream.registration.tags=module-testing-sidecar,testing,module,sidecar
pipestream.registration.http.scheme=${SERVICE_REGISTRATION_HTTP_SCHEME:http}
pipestream.registration.http.tls-enabled=${SERVICE_REGISTRATION_TLS_ENABLED:false}
pipestream.registration.http.enabled=true
pipestream.registration.http.base-path=${quarkus.http.root-path}
pipestream.registration.http.health-path=${quarkus.smallrye-health.liveness-path}

# Consul Configuration
pipestream.consul.host=${CONSUL_HOST:localhost}
pipestream.consul.port=${CONSUL_PORT:8500}

# Disable registration for tests
%test.pipestream.registration.enabled=false

# Health Configuration
quarkus.smallrye-health.root-path=/health
quarkus.smallrye-health.liveness-path=/health/live
quarkus.smallrye-health.readiness-path=/health/ready

# Enable OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.swagger-ui.title=Module Testing Sidecar
quarkus.smallrye-openapi.path=/q/openapi

# Quinoa frontend configuration
quarkus.quinoa.ui-root-path=/admin
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.bun-version=1.3.8
quarkus.quinoa.ignored-path-prefixes=/api,/q
%dev.quarkus.quinoa.dev-server.port=5175
%dev.quarkus.quinoa.dev-server.check-path=/admin/

module.testing.sidecar.platform-registration-service=platform-registration
module.testing.sidecar.repository-service=repository
module.testing.sidecar.default-pipeline-name=module-testing-sidecar
module.testing.sidecar.default-step-name=module-testing-step

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."ai.pipestream".level=DEBUG
quarkus.jackson.fail-on-empty-beans=false

# gRPC Message Size Configuration (2GB - 1 byte, max int value)
quarkus.grpc.server.max-inbound-message-size=2147483647
quarkus.grpc.clients.module-testing-sidecar.max-inbound-message-size=2147483647

# Test harness specific configuration
test.processor.name=test-processor
test.processor.delay.ms=0
test.processor.failure.rate=0.0

test.harness.health.degraded.threshold=0.5
test.harness.health.unhealthy.threshold=0.8
test.harness.health.always.healthy=false
test.harness.consul.check.enabled=false

# Test settings
%test.quarkus.http.port=0
%test.test.harness.health.always.healthy=true

# JVM Memory settings for large message processing
quarkus.native.additional-build-args=-J-Xmx4g
%dev.quarkus.devservices.timeout=120s

# Development specific test configuration
%dev.test.processor.failure.rate=0.1
